name: Build Demucs Executable

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch==1.13.1+cu117 torchaudio==0.13.1+cu117 --extra-index-url https://download.pytorch.org/whl/cu117
        pip install demucs PyInstaller

    - name: Download model files
      run: |
        mkdir -p packaging_resources/pretrained
        curl -L https://dl.fbaipublicfiles.com/demucs/hybrid_transformer/htdemucs_ft-4d8d2c3f.pth -o packaging_resources/pretrained/htdemucs_ft.pth
        copy demucs\pretrained\htdemucs_ft.json packaging_resources\pretrained\

    - name: Build executable
      run: |
        pyinstaller --onefile `
          --add-data "packaging_resources/pretrained;demucs_resources/pretrained" `
          --name demucs `
          demucs/separate.py

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: demucs-exe
        path: dist/demucs.exe
