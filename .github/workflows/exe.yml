name: Build Demucs EXE (CPU Only)
on: [push]

jobs:
  build-demucs-cpu:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==5.13.2
          pip install demucs==4.0.1
          pip install torch==2.1.0+cpu torchaudio==2.1.0+cpu -f https://download.pytorch.org/whl/torch_stable.html
          pip install ffmpeg-python librosa numpy==1.23.5 soundfile

      - name: Create entry script (PowerShell compatible)
        run: |
          $content = @"
import sys
from demucs.separate import main

if __name__ == "__main__":
    sys.exit(main())
"@
          Set-Content -Path demucs_entry.py -Value $content

      - name: Pre-download models
        run: |
          python -c "from demucs.pretrained import get_model; get_model('htdemucs_ft')"
          python -c "from demucs.pretrained import get_model; get_model('htdemucs')"
          python -c "from demucs.pretrained import get_model; get_model('mdx_extra_q')"

      - name: Build EXE with PyInstaller
        shell: cmd
        run: |
          pyinstaller --onefile demucs_entry.py ^
            --name demucs-cpu.exe ^
            --add-data "$env:LOCALAPPDATA\Programs\Python\Python310\Lib\site-packages\demucs\pretrained;demucs\pretrained" ^
            --add-data "$env:USERPROFILE\.cache\torch\hub\checkpoints;.cache\torch\hub\checkpoints" ^
            --add-data "$env:USERPROFILE\.cache\torch\demucs;.cache\torch\demucs" ^
            --hidden-import demucs.pretrained ^
            --hidden-import demucs.apply ^
            --hidden-import demucs.htdemucs ^
            --hidden-import torch._C ^
            --hidden-import torch._dynamo ^
            --hidden-import torch.utils ^
            --hidden-import scipy.special.cython_special ^
            --additional-hooks-dir=.

      - name: Add ffmpeg to package
        shell: cmd
        run: |
          curl -L https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip -o ffmpeg.zip
          7z x ffmpeg.zip -o./dist
          copy /Y .\dist\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe .\dist\
          copy /Y .\dist\ffmpeg-master-latest-win64-gpl\bin\ffprobe.exe .\dist\

      - name: Create batch script (PowerShell compatible)
        run: |
          $batContent = @"
@echo off
set DEMUCS_MODEL_DIR=%~dp0.cache\torch\demucs
"%~dp0demucs-cpu.exe" %*
"@
          Set-Content -Path .\dist\demucs-cpu.bat -Value $batContent

      - name: Create standalone package
        shell: cmd
        run: |
          7z a demucs-cpu-package.zip .\dist\*

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: demucs-cpu-package
          path: demucs-cpu-package.zip
