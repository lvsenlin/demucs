name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller torch torchaudio demucs
        
    - name: Download model
      run: |
        python -c "from demucs.pretrained import get_model; get_model('htdemucs_ft')"
        
    - name: Prepare models
      run: |
        $modelPath = "$env:USERPROFILE\.cache\torch\hub\checkpoints\htdemucs_ft"
        New-Item -ItemType Directory -Path "models" -Force
        Copy-Item -Path "$modelPath\*" -Destination "models\" -Recurse
        
    - name: Build executable
      run: |
        pyinstaller --noconfirm --onefile --console `
          --name "demucs" `
          --add-data "models;models" `
          --hidden-import "demucs" `
          --hidden-import "demucs.apply" `
          --hidden-import "demucs.htdemucs" `
          --hidden-import "demucs.pretrained" `
          --hidden-import "dora.log" `
          --hidden-import "torch" `
          --hidden-import "torchaudio" `
          demucs/separate.py
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: demucs_executable
        path: dist/demucs.exe
