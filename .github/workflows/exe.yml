name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch==2.0.1 torchaudio==2.0.2
        pip install demucs==4.0.0
        pip install pyinstaller==5.13.0
        pip install soundfile==0.12.1

    - name: Download htdemucs_ft model
      run: |
        python -c "from demucs.pretrained import get_model; get_model('htdemucs_ft')"
        mkdir -p models/htdemucs_ft
        copy "%USERPROFILE%\.cache\torch\hub\checkpoints\htdemucs_ft\*" models/htdemucs_ft

    - name: Build executable
      run: |
        pyinstaller --onefile ^
          --name demucs.exe ^
          --add-data "models;models" ^
          --hidden-import="demucs" ^
          --hidden-import="demucs.apply" ^
          --hidden-import="demucs.htdemucs" ^
          --hidden-import="demucs.pretrained" ^
          --hidden-import="demucs.api" ^
          --hidden-import="soundfile" ^
          --hidden-import="torch" ^
          demucs/separate.py

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: demucs-binaries
        path: dist/demucs.exe
