name: Build Demucs Executable

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch==2.3.0+cu121 torchaudio==2.3.0+cu121 --index-url https://download.pytorch.org/whl/cu121
        pip install demucs PyInstaller

    - name: Download model files
      run: |
        mkdir -p packaging_resources/pretrained
        curl -L https://dl.fbaipublicfiles.com/demucs/hybrid_transformer/htdemucs_ft-4d8d2c3f.pth -o packaging_resources/pretrained/htdemucs_ft.pth
        curl -L https://raw.githubusercontent.com/facebookresearch/demucs/main/demucs/pretrained/htdemucs_ft.json -o packaging_resources/pretrained/htdemucs_ft.json

    - name: Build executable
      run: pyinstaller --onefile --add-data "packaging_resources/pretrained;demucs_resources/pretrained" --add-data "demucs;demucs" --name demucs --hidden-import demucs.api --hidden-import demucs.apply --hidden-import demucs.htdemucs --hidden-import demucs.pretrained demucs/separate.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: demucs-exe
        path: dist/demucs.exe
