name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller torch torchaudio demucs
        
    - name: Download model with explicit cache path
      run: |
        # 创建明确的缓存目录
        $cachePath = "$env:RUNNER_TEMP\torch_cache"
        New-Item -ItemType Directory -Path $cachePath -Force
        
        # 设置环境变量
        $env:TORCH_HOME = $cachePath
        
        # 下载模型
        python -c "from demucs.pretrained import get_model; get_model('htdemucs_ft')"
        
        # 验证下载
        $modelPath = "$cachePath\hub\checkpoints\htdemucs_ft"
        if (Test-Path -Path $modelPath) {
          echo "Model downloaded successfully to $modelPath"
          Get-ChildItem -Path $modelPath
        } else {
          echo "::error::Model download failed!"
          exit 1
        }
        
    - name: Prepare models
      run: |
        $cachePath = "$env:RUNNER_TEMP\torch_cache"
        $modelPath = "$cachePath\hub\checkpoints\htdemucs_ft"
        New-Item -ItemType Directory -Path "models" -Force
        Copy-Item -Path "$modelPath\*" -Destination "models\" -Recurse
        echo "Copied model files:"
        Get-ChildItem -Path "models"
        
    - name: Build executable
      run: |
        pyinstaller --noconfirm --onefile --console `
          --name "demucs" `
          --add-data "models;models" `
          --hidden-import "demucs" `
          --hidden-import "demucs.apply" `
          --hidden-import "demucs.htdemucs" `
          --hidden-import "demucs.pretrained" `
          --hidden-import "dora.log" `
          --hidden-import "torch" `
          --hidden-import "torchaudio" `
          demucs/separate.py
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: demucs_executable
        path: dist/demucs.exe
