name: Build Demucs Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch==2.1.0 torchaudio==2.1.0
        pip install demucs==4.0.0 pyinstaller==6.0.0
        
    - name: Prepare models
      run: |
        python -c "from demucs.pretrained import get_model; get_model('htdemucs_ft')"
        mkdir models
        copy "$env:USERPROFILE\.cache\torch\hub\facebookresearch_demucs_main\htdemucs_ft*" models\

    - name: Build executable
      run: |
        pyinstaller --onefile `
          --add-data "models;models" `
          --name demucs.exe `
          demucs_exe.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4  # 更新到 v4 版本
      with:
        name: demucs-windows
        path: dist/demucs.exe
