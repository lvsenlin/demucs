name: Build Demucs EXE (CPU Only)
on: [push]

jobs:
  build-demucs-cpu:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==5.13.2
          pip install demucs==4.0.1
          pip install torch==2.1.0+cpu torchaudio==2.1.0+cpu -f https://download.pytorch.org/whl/torch_stable.html
          pip install ffmpeg-python librosa numpy==1.23.5 soundfile diffq
          pip install tqdm  # 添加进度条支持

      - name: Create entry script
        shell: cmd
        run: |
          echo import os > demucs_entry.py
          echo import sys >> demucs_entry.py
          echo. >> demucs_entry.py
          echo "# Fix runtime model path and output directory" >> demucs_entry.py
          echo "if getattr(sys, 'frozen', False):" >> demucs_entry.py
          echo "    os.environ['DEMUCS_MODEL_DIR'] = os.path.join(sys._MEIPASS, r'.cache\torch\demucs')" >> demucs_entry.py
          echo "    # Ensure output directory is writable" >> demucs_entry.py
          echo "    os.environ['DEMUCS_OUTPUT_DIR'] = os.path.join(os.getcwd(), 'separated')" >> demucs_entry.py
          echo "else:" >> demucs_entry.py
          echo "    os.environ['DEMUCS_OUTPUT_DIR'] = os.path.join(os.getcwd(), 'separated')" >> demucs_entry.py
          echo. >> demucs_entry.py
          echo "# Enable verbose output" >> demucs_entry.py
          echo "os.environ['DEMUCS_VERBOSE'] = '1'" >> demucs_entry.py
          echo. >> demucs_entry.py
          echo "from demucs.separate import main" >> demucs_entry.py
          echo. >> demucs_entry.py
          echo "if __name__ == '__main__':" >> demucs_entry.py
          echo "    # Print environment for debugging" >> demucs_entry.py
          echo "    print(f\"Model directory: {os.environ.get('DEMUCS_MODEL_DIR', 'default')}\")" >> demucs_entry.py
          echo "    print(f\"Output directory: {os.environ.get('DEMUCS_OUTPUT_DIR', 'default')}\")" >> demucs_entry.py
          echo "    sys.exit(main())" >> demucs_entry.py
          echo === Entry script content ===
          type demucs_entry.py
          echo ============================

      - name: Pre-download models and create cache
        shell: cmd
        run: |
          mkdir .cache
          mkdir .cache\torch
          mkdir .cache\torch\demucs
          
          set CACHE_PATH=.cache\torch\demucs
          
          python -c "import os; os.environ['DEMUCS_MODEL_DIR'] = r'%CACHE_PATH%'; from demucs.pretrained import get_model; get_model('htdemucs_ft')"
          python -c "import os; os.environ['DEMUCS_MODEL_DIR'] = r'%CACHE_PATH%'; from demucs.pretrained import get_model; get_model('htdemucs')"
          python -c "import os; os.environ['DEMUCS_MODEL_DIR'] = r'%CACHE_PATH%'; from demucs.pretrained import get_model; get_model('mdx_extra_q')"
          
          dir /s .cache

      - name: Copy demucs remote files
        shell: cmd
        run: |
          python -c "import os, shutil, demucs; src = os.path.join(os.path.dirname(demucs.__file__), 'remote'); dst = 'demucs_remote'; shutil.copytree(src, dst, dirs_exist_ok=True);"

      - name: Build EXE with PyInstaller
        shell: cmd
        run: |
          pyinstaller --onefile demucs_entry.py ^
            --name demucs-cpu.exe ^
            --add-data ".cache;.cache" ^
            --add-data "demucs_remote;demucs/remote" ^
            --hidden-import demucs.pretrained ^
            --hidden-import demucs.apply ^
            --hidden-import demucs.htdemucs ^
            --hidden-import torch._C ^
            --hidden-import torch._dynamo ^
            --hidden-import torch.utils ^
            --hidden-import scipy.special.cython_special ^
            --hidden-import diffq ^
            --hidden-import tqdm

      - name: Add ffmpeg to package
        shell: cmd
        run: |
          curl -L https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip -o ffmpeg.zip
          7z x ffmpeg.zip -o./dist
          copy /Y .\dist\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe .\dist\
          copy /Y .\dist\ffmpeg-master-latest-win64-gpl\bin\ffprobe.exe .\dist\

      - name: Create batch script
        shell: cmd
        run: |
          echo @echo off > dist\demucs-cpu.bat
          echo REM Ensure output directory exists >> dist\demucs-cpu.bat
          echo if not exist "%%~dp0separated" mkdir "%%~dp0separated" >> dist\demucs-cpu.bat
          echo. >> dist\demucs-cpu.bat
          echo "%%~dp0demucs-cpu.exe" %%* >> dist\demucs-cpu.bat
          echo. >> dist\demucs-cpu.bat
          echo echo. >> dist\demucs-cpu.bat
          echo echo Output files are in: %%~dp0separated >> dist\demucs-cpu.bat
          echo pause >> dist\demucs-cpu.bat

      - name: Create standalone package
        shell: cmd
        run: |
          7z a demucs-cpu-package.zip .\dist\*

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: demucs-cpu-package
          path: demucs-cpu-package.zip
