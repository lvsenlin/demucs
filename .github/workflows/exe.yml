name: Build Demucs Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install UPX
      run: |
        Invoke-WebRequest -Uri "https://github.com/upx/upx/releases/download/v4.2.2/upx-4.2.2-win64.zip" -OutFile "upx.zip"
        Expand-Archive -Path "upx.zip" -DestinationPath "upx"
        Move-Item -Path "upx\upx-4.2.2-win64\upx.exe" -Destination "upx.exe"
        Remove-Item -Recurse -Force "upx", "upx.zip"

    - name: Install minimal dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch==2.3.0+cpu torchaudio==2.3.0+cpu --index-url https://download.pytorch.org/whl/cpu
        pip install demucs PyInstaller soundfile
        
    - name: Prepare resources
      run: |
        # 创建资源目录
        mkdir -p packaging_resources/pretrained
        
        # 下载模型文件
        curl -L https://dl.fbaipublicfiles.com/demucs/hybrid_transformer/htdemucs_ft-4d8d2c3f.pth -o packaging_resources/pretrained/htdemucs_ft.pth
        curl -L https://raw.githubusercontent.com/facebookresearch/demucs/main/demucs/pretrained/htdemucs_ft.json -o packaging_resources/pretrained/htdemucs_ft.json
        
        # 使用PowerShell复制整个demucs包
        Copy-Item -Path "demucs" -Destination "packaging_resources\demucs" -Recurse -Force

    - name: Build optimized executable
      run: |
        # 使用PyInstaller构建
        pyinstaller --onefile `
          --add-data "packaging_resources/demucs;demucs" `
          --add-data "packaging_resources/pretrained;demucs_resources/pretrained" `
          --name demucs `
          --upx-dir . `
          --exclude-module matplotlib `
          --exclude-module scipy `
          --exclude-module pandas `
          --exclude-module sklearn `
          --exclude-module tensorflow `
          --exclude-module keras `
          --hidden-import "demucs" `
          --hidden-import "demucs.api" `
          --hidden-import "demucs.apply" `
          --hidden-import "demucs.htdemucs" `
          --hidden-import "demucs.pretrained" `
          --hidden-import "demucs.states" `  # 添加states模块
          --clean `
          --noconfirm `
          demucs/separate.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: demucs-exe
        path: dist/demucs.exe
